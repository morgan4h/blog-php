<!DOCTYPE html>
<html lang="en">
<head>
<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg-dark: #0f0c29; /* Deep dark purple/black */
    --accent-gradient: linear-gradient(45deg, #f093fb 0%, #f5576c 100%); /* Pink to Purple */
    --text-main: #ffffff;
    --text-dim: #b3b3b3;
    --card-bg: #1a1a2e;
  }

  body {
    background-color: var(--bg-dark);
    font-family: 'Roboto', sans-serif;
    margin: 0;
    color: var(--text-main);
  }

  .container {
    max-width: 935px;
    margin: 30px auto;
    padding: 0 20px;
  }

  /* --- Profile Header --- */
  header {
    display: flex;
    align-items: center;
    margin-bottom: 44px;
    padding: 20px;
  }

  .profile-pic-container {
    flex-basis: 30%;
    display: flex;
    justify-content: center;
  }

  .profile-pic {
    width: 150px;
    height: 150px;
    border-radius: 50%;
    padding: 3px;
    /* Instagram-style ring with your colors */
    background: var(--accent-gradient);
    object-fit: cover;
    border: 2px solid var(--bg-dark);
  }

  .profile-info {
    flex-basis: 70%;
  }

  .top-row {
    display: flex;
    align-items: center;
    gap: 20px;
    margin-bottom: 20px;
  }

  .username {
    font-size: 24px;
    font-weight: 300;
  }

  /* --- Pink/Purple Buttons --- */
  .btn {
    background: var(--accent-gradient);
    border: none;
    border-radius: 8px;
    padding: 8px 18px;
    font-weight: 600;
    font-size: 14px;
    cursor: pointer;
    color: white;
    transition: transform 0.2s;
  }

  .btn:hover {
    transform: scale(1.05);
    opacity: 0.9;
  }

  .stats {
    display: flex;
    gap: 40px;
    margin-bottom: 20px;
    list-style: none;
    padding: 0;
  }

  .stats span {
    font-weight: 600;
    color: #f093fb; /* Highlight numbers in pink */
  }

  .bio {
    font-size: 14px;
    line-height: 1.5;
    color: var(--text-dim);
  }

  .bio-name {
    font-weight: 600;
    color: var(--text-main);
    display: block;
    margin-bottom: 5px;
  }

  /* --- Image Grid --- */
  .grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 15px; /* Spaced out slightly more for the dark theme */
    border-top: 1px solid #2d2d44;
    padding-top: 40px;
  }

  .post-box {
    aspect-ratio: 1 / 1;
    background-color: var(--card-bg);
    border-radius: 4px;
    overflow: hidden;
    position: relative;
    border: 1px solid #333;
  }

  /* Hover effect for the boxes */
  .post-box::after {
    content: '';
    position: absolute;
    top: 0; left: 0; width: 100%; height: 100%;
    background: var(--accent-gradient);
    opacity: 0;
    transition: 0.3s;
  }

  .post-box:hover::after {
    opacity: 0.2;
  }

  .post-box img {
    width: 100%;
    height: 100%;
    object-fit: cover;
  }

  /* Mobile Tweaks */
  @media (max-width: 735px) {
    header { flex-direction: column; text-align: center; }
    .top-row { flex-direction: column; gap: 10px; margin-top: 20px; }
    .grid { gap: 5px; }
    .stats { justify-content: center; }
  }
</style>
</head>
<body>

<div class="container">
  <header>
    <div class="profile-pic-container">
      <img src="https://static.vecteezy.com/system/resources/thumbnails/072/217/525/small/cute-black-cat-illustration-halloween-theme-big-shiny-eyes-furry-pet-character-orange-geometric-background-creative-poster-and-decoration-art-vector.jpg" class="profile-pic" alt="Profile">
    </div>
    
    <div class="profile-info">
      <div class="top-row">
        <div class="username">beni.design.vibe</div>
          <button class="btn">Log Out</button>
      </div>

      <ul class="stats">
        <li><span>0</span> posts</li>
        <li><span>0</span> followers</li>
        <li><span>0</span> following</li>
      </ul>

      <div class="bio">
        <span class="bio-name">Beni Smith</span>
       </span> 
      </div>
    </div>
  </header>

  <main class="grid">
    <!-- 9 boxes as requested -->
    <!-- <div class="post-box"><img src="https://picsum.photos/501"></div>
    <div class="post-box"><img src="https://picsum.photos/502"></div>
    <div class="post-box"><img src="https://picsum.photos/503"></div>
    <div class="post-box"><img src="https://picsum.photos/504"></div>
    <div class="post-box"><img src="https://picsum.photos/505"></div>
    <div class="post-box"><img src="https://picsum.photos/506"></div>
    <div class="post-box"><img src="https://picsum.photos/507"></div>
    <div class="post-box"><img src="https://picsum.photos/508"></div>
    <div class="post-box"><img src="https://picsum.photos/509"></div> -->
  </main>
</div>
<script>
  // Simple check for cookie name, fallback if cookie is empty
  let theName = document.querySelector('.username');
  if(document.cookie.length > 18) {
    theName.textContent = document.cookie.slice(14, 18).toLowerCase();
    document.querySelector('.bio-name').textContent = document.cookie.slice(14, 18) + " Profile."
  }
  document.querySelector('.btn').onclick = function() {
        // Clear all cookies for the current domain
    document.cookie.split(";").forEach(function(cookie) {
        const eqPos = cookie.indexOf("=");
        const name = eqPos > -1 ? cookie.substr(0, eqPos).trim() : cookie.trim();
        // Set cookie expiry date to past to delete it
        document.cookie = name + "=;expires=Thu, 01 Jan 1970 00:00:00 GMT;path=/";
    });

    // Clear all localStorage data
    localStorage.clear();

    // Optionally, clear sessionStorage as well
    sessionStorage.clear();
    location.href = '../../index.html'
    console.log('jh')
    console.log("All cookies, localStorage, and sessionStorage have been cleared.");
  }
</script>
</body>
</html>
